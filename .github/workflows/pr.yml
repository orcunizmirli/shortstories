name: PR Validation
on:
  pull_request:
  push: { branches: [main] }
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_26.6.app
      - name: Dependency lint (03 §4 R1-R7)
        run: swift Scripts/dependency-lint.swift
      - name: SwiftLint + SwiftFormat
        env:
          # SwiftFormat SÜRÜMÜ PİNLİ: kural davranışı sürümle değişiyor ve runner brew
          # indeksi bayat kalabiliyor (0.61.1'e sabitlenip yerelle çelişti). Yerel geliştirme
          # sürümüyle birlikte, bilinçli bir PR ile güncellenir.
          SWIFTFORMAT_VERSION: "0.62.1"
        run: |
          brew install swiftlint 2>/dev/null || true
          curl -fsSL -o /tmp/sf.zip "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.artifactbundle.zip"
          unzip -q -o /tmp/sf.zip -d /tmp/sf
          SF="/tmp/sf/swiftformat.artifactbundle/swiftformat-${SWIFTFORMAT_VERSION}-macos/bin/swiftformat"
          chmod +x "$SF"
          swiftlint version && "$SF" --version
          swiftlint lint --strict
          "$SF" --lint .

  build-test:
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        package: [AppFoundation, DesignSystem, ContentKit, AnalyticsKit,
                  PlayerKit, DiscoverKit, LibraryKit, WalletKit, RewardsKit, ProfileKit]
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode_26.6.app
      - name: Build & test ${{ matrix.package }}
        working-directory: Packages/${{ matrix.package }}
        run: |
          # En YENİ runtime'daki iPhone'u seç (simctl çıktısında runtime bölümleri artan sürümle sıralı;
          # eski runtime cihazları güncel Xcode'da destination olarak kabul edilmeyebiliyor)
          DEST="platform=iOS Simulator,name=$(xcrun simctl list devices available | grep -o 'iPhone [^(]*' | tail -1 | sed 's/ *$//')"
          # Şema commit'li paylaşımlı CI şemasıdır (.swiftpm/xcode/xcshareddata/xcschemes) —
          # otomatik üretilen "-Package" şeması temiz checkout'ta güvenilir değil.
          xcodebuild test -scheme "${{ matrix.package }}-CI" -destination "$DEST" -quiet
