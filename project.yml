name: ShortSeries
options:
  bundleIdPrefix: com.shortseries
  deploymentTarget: { iOS: "17.0" }
packages:
  AppFoundation:  { path: Packages/AppFoundation }
  DesignSystem:   { path: Packages/DesignSystem }
  ContentKit:     { path: Packages/ContentKit }
  AnalyticsKit:   { path: Packages/AnalyticsKit }
  PlayerKit:      { path: Packages/PlayerKit }
  DiscoverKit:    { path: Packages/DiscoverKit }
  LibraryKit:     { path: Packages/LibraryKit }
  WalletKit:      { path: Packages/WalletKit }
  RewardsKit:     { path: Packages/RewardsKit }
  ProfileKit:     { path: Packages/ProfileKit }
targets:
  ShortSeriesApp:
    type: application
    platform: iOS
    sources:
      # CatalogHost yalnız DesignSystemCatalog target'ına aittir; iki @main çakışmasını önler.
      - path: App
        excludes: ["CatalogHost/**"]
      # SS-141 rich push SAF çekirdeği — NSE target'ıyla PAYLAŞILAN dosya. App target'a da derlenir ki
      # AppTests `@testable import ShortSeriesApp` ile izole test edebilsin (NSE runtime testi olmadan).
      - path: SharedPush
    dependencies:
      - { package: AppFoundation }
      - { package: DesignSystem }
      - { package: ContentKit }
      - { package: AnalyticsKit }
      - { package: PlayerKit }
      - { package: DiscoverKit }
      - { package: LibraryKit }
      - { package: WalletKit }
      - { package: RewardsKit }
      - { package: ProfileKit }
      # SS-141 rich push: NSE app'e gömülür (Embed App Extensions). `embed: true` kopyalama fazını,
      # target bağımlılığı da build sırasını sağlar → `ShortSeriesApp` build'i NSE'yi de derler.
      - { target: NotificationServiceExtension, embed: true }
    # SS-142 platform kaydı: custom scheme (CFBundleURLTypes) + universal link (associated-domains).
    # Bu iki giriş noktası olmadan gelen link platformda tetiklenmez (onOpenURL çağrılmaz / AASA
    # eşleşmez). GENERATE_INFOPLIST_FILE array anahtarları (URL types) taşıyamadığından üretilen
    # Info.plist açık tanımlanır; orientation/launch-screen anahtarları buraya taşınır (02 §8.1/§8.2).
    info:
      path: App/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}                       # üretilen launch screen (portrait)
        UISupportedInterfaceOrientations:        # portrait-locked (kanon §2)
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:                         # custom scheme shortseries:// (02 §8.1)
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.shortseries.app
            CFBundleURLSchemes:
              - shortseries
        UIBackgroundModes:                        # SS-140: sessiz/arka plan push teslimi (content-available)
          - remote-notification
    entitlements:
      path: App/ShortSeriesApp.entitlements
      properties:
        # Universal link: https://shortseries.app/... path'leri uygulamaya çözülür (02 §8.1.1 AASA).
        com.apple.developer.associated-domains:
          - applinks:shortseries.app
        # SS-140 APNs kaydı: registerForRemoteNotifications() bu entitlement olmadan token üretmez.
        # Debug/simulator 'development'; App Store dağıtımı 'production' (release entitlements ayrımı SS-006).
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shortseries.app
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"            # iPhone-only (kanon §2)
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO            # açık Info.plist (yukarıdaki info:) — array anahtarları için
        CODE_SIGN_STYLE: Automatic
  NotificationServiceExtension:                 # SS-141 rich push — Notification Service Extension (NSE)
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # NSE'ye özgü UN köprüsü + görsel indirme.
      - path: NotificationServiceExtension
      # SS-141 SAF çekirdeği: App target'ıyla PAYLAŞILAN kaynak (aynı kategori kimlikleri + parse mantığı
      # hem NSE runtime'ında hem AppTests'te). NSE'nin kendi @main/UIKit'i YOK — yalnız bu paylaşılan dosya.
      - path: SharedPush
    dependencies:
      - { package: AppFoundation }              # PushPayload/PushCampaignType (extension-safe, saf Foundation)
    info:
      path: NotificationServiceExtension/Info.plist
      properties:
        # Sürüm anahtarları ana app (0.1.0 / 1) ile EŞLEŞMELİ — eşleşmezse embedded binary doğrulama uyarısı.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shortseries.app.NotificationService
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1"            # iPhone-only (kanon §2)
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: NO            # açık Info.plist (yukarıdaki info:) — NSExtension nested dict için
        CODE_SIGN_STYLE: Automatic
  ShortSeriesAppTests:                          # App/DI adaptörlerinin SAF dönüşüm birim testleri
    type: bundle.unit-test
    platform: iOS
    sources: [AppTests]
    dependencies:
      - target: ShortSeriesApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
  DesignSystemCatalog:                          # SS-007 demo target
    type: application
    platform: iOS
    sources: [App/CatalogHost]                  # DSCatalogView'i host eden ~20 satırlık @main
    dependencies: [{ package: DesignSystem }]
    settings:
      base: { PRODUCT_BUNDLE_IDENTIFIER: com.shortseries.catalog, GENERATE_INFOPLIST_FILE: YES }
